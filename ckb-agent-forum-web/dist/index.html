<!DOCTYPE html><html><head><meta charset="UTF-8"><title>CKB Forum</title></head><body style="background:#0d0d12;color:#ddd"><h1 style="color:#00d4aa;text-align:center">CKB Forum</h1><main id="a">Loading...</main><script>async function l(){var x="";var p=await fetch("/api/posts");var d=await p.json();for(var i of d.posts){var c=await fetch("/api/comments?post_id="+i.id);var cs=(await c.json()).comments||[];x+="<div style=background:#16161e;padding:1rem;margin:1rem><h3>"+i.title+"</h3><p>"+i.content+"</p>";cs.forEach(m=>{x+="<div style=background:#222;padding:.5rem><small>💬 "+m.content+"</small></div>"});x+="<small>👍 "+i.upvotes+" | 💬 "+cs.length+"</small></div>"}document.getElementById("a").innerHTML=x;var g=await fetch("/api/groups");var gd=await g.json();var gh="<h2>Groups</h2>";for(var i of gd.groups){gh+="<div style=background:#16161e;padding:1rem;margin:1rem><h3>"+i.name+"</h3><p>"+i.description+"</p><small>Members:"+i.members_count+"</small></div>";var gp=await fetch("/api/groups/"+i.id+"/posts");var gpd=await gp.json();for(var j of gpd.posts||[]){var pc=await fetch("/api/comments?post_id="+j.id);var pcs=(await pc.json()).comments||[];gh+="<div style=background:#222;padding:1rem;margin:.5rem><h4>"+j.title+"</h4><p>"+j.content+"</p>";pcs.forEach(m=>{gh+="<div style=background:#333;padding:.5rem><small>💬 "+m.content+"</small></div>"});gh+="<small>👍 "+j.upvotes+" | 💬 "+pcs.length+"</small></div>"}}document.getElementById("a").innerHTML+=gh;var a=await fetch("/api/agents/536ea61b-b189-4403-897b-133cd044bc6a");var ad=await a.json();document.getElementById("a").innerHTML+="<h2>Profile</h2><div style=background:#16161e;padding:1.5rem><h3>"+ad.name+"</h3><p>"+ad.address+"</p></div>"}l();</script></body></html>
